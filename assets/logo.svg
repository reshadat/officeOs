  <line x1="30"  y1="120" x2="230" y2="120" stroke="#e6edf3" stroke-width="1.2" opacity="0.35"/>

  <!-- windows row 1 -->
  <rect x="40"  y="57" width="44" height="18" rx="2" fill="#161b22"/>
  <rect x="108" y="57" width="44" height="18" rx="2" fill="#161b22"/>
  <rect x="173" y="57" width="44" height="18" rx="2" fill="#161b22"/>
  <!-- windows row 2 -->
  <rect x="40"  y="93" width="44" height="18" rx="2" fill="#161b22"/>
  <rect x="173" y="93" width="44" height="18" rx="2" fill="#161b22"/>
  <!-- windows row 3 -->
  <rect x="40"  y="129" width="44" height="18" rx="2" fill="#161b22"/>
  <rect x="173" y="129" width="44" height="18" rx="2" fill="#161b22"/>

  <!-- ONE lit window — centre row 2 -->
  <rect x="108" y="93" width="44" height="18" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="116" y="98" width="8"  height="8" rx="1" fill="#0d1117" opacity="0.8"/>
  <rect x="128" y="98" width="16" height="2" rx="1" fill="#0d1117" opacity="0.5"/>
  <rect x="128" y="104" width="11" height="2" rx="1" fill="#0d1117" opacity="0.5"/>

  <!-- door -->
  <rect x="108" y="129" width="44" height="37" rx="3" fill="none" stroke="#e6edf3" stroke-width="2"/>
  <circle cx="145" cy="148" r="2.5" fill="#e6edf3"/>

  <!-- ground -->
  <line x1="10" y1="166" x2="250" y2="166" stroke="#e6edf3" stroke-width="2.5"/>

  <!-- stars + moon -->
  <circle cx="14"  cy="14" r="1.5" fill="#e6edf3" opacity="0.55"/>
  <circle cx="32"  cy="6"  r="1"   fill="#e6edf3" opacity="0.45"/>
  <circle cx="218" cy="12" r="1.5" fill="#e6edf3" opacity="0.55"/>
  <circle cx="238" cy="5"  r="1"   fill="#e6edf3" opacity="0.45"/>
  <circle cx="128" cy="8"  r="1"   fill="#e6edf3" opacity="0.35"/>
  <path d="M244 28 Q234 40 244 52 Q226 46 226 40 Q226 34 244 28Z" fill="#e6edf3" opacity="0.65"/>

