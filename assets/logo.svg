  <rect x="30" y="18" width="200" height="148" rx="5" fill="none" stroke="#e6edf3" stroke-width="2.5"/>
  <line x1="30"  y1="48" x2="230" y2="48"  stroke="#e6edf3" stroke-width="1.8"/>
  <line x1="97"  y1="48" x2="97"  y2="166" stroke="#e6edf3" stroke-width="1.2" opacity="0.35"/>
