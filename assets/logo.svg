<svg width="560" height="210" viewBox="0 0 560 210" xmlns="http://www.w3.org/2000/svg">
  <!-- dark background -->
  <rect width="560" height="210" rx="20" fill="#0d1117"/>

  <!-- ── LEFT: building illustration ── -->

  <!-- building facade -->
  <rect x="30" y="20" width="190" height="155" rx="6" fill="none" stroke="#e6edf3" stroke-width="2.5"/>

  <!-- roof line -->
  <line x1="30" y1="50" x2="220" y2="50" stroke="#e6edf3" stroke-width="2"/>

  <!-- columns -->
  <line x1="93"  y1="50" x2="93"  y2="175" stroke="#e6edf3" stroke-width="1.5" opacity="0.35"/>
  <line x1="157" y1="50" x2="157" y2="175" stroke="#e6edf3" stroke-width="1.5" opacity="0.35"/>

  <!-- floors -->
  <line x1="30" y1="89"  x2="220" y2="89"  stroke="#e6edf3" stroke-width="1.5" opacity="0.35"/>
  <line x1="30" y1="128" x2="220" y2="128" stroke="#e6edf3" stroke-width="1.5" opacity="0.35"/>

  <!-- dark windows row 1 -->
  <rect x="41"  y="60" width="38" height="20" rx="2" fill="#161b22"/>
  <rect x="106" y="60" width="38" height="20" rx="2" fill="#161b22"/>
  <rect x="170" y="60" width="38" height="20" rx="2" fill="#161b22"/>

  <!-- dark windows row 2 -->
  <rect x="41"  y="99" width="38" height="20" rx="2" fill="#161b22"/>
  <rect x="170" y="99" width="38" height="20" rx="2" fill="#161b22"/>

  <!-- dark windows row 3 -->
  <rect x="41"  y="138" width="38" height="20" rx="2" fill="#161b22"/>
  <rect x="170" y="138" width="38" height="20" rx="2" fill="#161b22"/>

  <!-- ONE lit window — center row 2 -->
  <rect x="106" y="99" width="38" height="20" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="113" y="104" width="7"  height="8" rx="1" fill="#0d1117" opacity="0.8"/>
  <rect x="123" y="104" width="14" height="2" rx="1" fill="#0d1117" opacity="0.5"/>
  <rect x="123" y="109" width="10" height="2" rx="1" fill="#0d1117" opacity="0.5"/>

  <!-- door -->
  <rect x="106" y="138" width="38" height="37" rx="3" fill="none" stroke="#e6edf3" stroke-width="2"/>
  <circle cx="138" cy="157" r="2.5" fill="#e6edf3"/>

  <!-- ground -->
  <line x1="10" y1="175" x2="240" y2="175" stroke="#e6edf3" stroke-width="2.5"/>

  <!-- stars -->
  <circle cx="14"  cy="16" r="1.5" fill="#e6edf3" opacity="0.6"/>
  <circle cx="30"  cy="8"  r="1"   fill="#e6edf3" opacity="0.5"/>
  <circle cx="210" cy="14" r="1.5" fill="#e6edf3" opacity="0.6"/>
  <circle cx="224" cy="6"  r="1"   fill="#e6edf3" opacity="0.5"/>
  <circle cx="120" cy="10" r="1"   fill="#e6edf3" opacity="0.4"/>

  <!-- moon -->
  <path d="M228 30 Q218 42 228 54 Q210 47 210 42 Q210 36 228 30Z" fill="#e6edf3" opacity="0.7"/>

  <!-- ── divider ── -->
  <line x1="258" y1="20" x2="258" y2="185" stroke="#e6edf3" stroke-width="1" opacity="0.15"/>

  <!-- ── RIGHT: text ── -->
  <text x="290" y="100" font-family="ui-monospace, SFMono-Regular, 'Courier New', monospace"
        font-size="42" font-weight="800" fill="#e6edf3" letter-spacing="8">OFFICE</text>
  <text x="290" y="148" font-family="ui-monospace, SFMono-Regular, 'Courier New', monospace"
        font-size="42" font-weight="800" fill="#22c55e" letter-spacing="8">OS</text>
  <text x="292" y="174" font-family="ui-monospace, SFMono-Regular, 'Courier New', monospace"
        font-size="11" fill="#8b949e" letter-spacing="3">one light always on</text>
</svg>
