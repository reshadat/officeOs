  <line x1="268" y1="18" x2="268" y2="182" stroke="#e6edf3" stroke-width="1" opacity="0.12"/>

  <!-- ══ RIGHT ZONE x=280–590: text ══ -->
  <text x="288" y="110"
        font-family="ui-monospace, SFMono-Regular, 'SF Mono', monospace"
