<svg width="240" height="235" viewBox="0 0 240 235" xmlns="http://www.w3.org/2000/svg">
  <!-- dark background pill -->
  <rect width="240" height="235" rx="20" fill="#0d1117"/>

  <!-- office building facade — recentered for 240px canvas -->
  <rect x="30" y="30" width="180" height="160" rx="6" fill="none" stroke="#e6edf3" stroke-width="3"/>

  <!-- roof line -->
  <line x1="30" y1="62" x2="210" y2="62" stroke="#e6edf3" stroke-width="2"/>

  <!-- building columns -->
  <line x1="90"  y1="62" x2="90"  y2="190" stroke="#e6edf3" stroke-width="1.5" opacity="0.4"/>
  <line x1="150" y1="62" x2="150" y2="190" stroke="#e6edf3" stroke-width="1.5" opacity="0.4"/>

  <!-- floor lines -->
  <line x1="30" y1="103" x2="210" y2="103" stroke="#e6edf3" stroke-width="1.5" opacity="0.4"/>
  <line x1="30" y1="144" x2="210" y2="144" stroke="#e6edf3" stroke-width="1.5" opacity="0.4"/>

  <!-- dark windows -->
  <rect x="42"  y="74"  width="34" height="18" rx="2" fill="#161b22"/>
  <rect x="102" y="74"  width="34" height="18" rx="2" fill="#161b22"/>
  <rect x="162" y="74"  width="34" height="18" rx="2" fill="#161b22"/>

  <rect x="42"  y="115" width="34" height="18" rx="2" fill="#161b22"/>
  <rect x="162" y="115" width="34" height="18" rx="2" fill="#161b22"/>

  <rect x="42"  y="156" width="34" height="18" rx="2" fill="#161b22"/>
  <rect x="162" y="156" width="34" height="18" rx="2" fill="#161b22"/>

  <!-- ONE lit window -->
  <rect x="102" y="115" width="34" height="18" rx="2" fill="#22c55e" opacity="0.9"/>
  <rect x="109" y="120" width="6"  height="7"  rx="1" fill="#0d1117" opacity="0.8"/>
  <rect x="118" y="120" width="12" height="2"  rx="1" fill="#0d1117" opacity="0.5"/>
  <rect x="118" y="125" width="9"  height="2"  rx="1" fill="#0d1117" opacity="0.5"/>

  <!-- door -->
  <rect x="102" y="156" width="36" height="34" rx="3" fill="none" stroke="#e6edf3" stroke-width="2"/>
  <circle cx="132" cy="173" r="2.5" fill="#e6edf3"/>

  <!-- ground -->
  <line x1="10" y1="190" x2="230" y2="190" stroke="#e6edf3" stroke-width="2.5"/>

  <!-- stars -->
  <circle cx="14"  cy="20" r="1.5" fill="#e6edf3" opacity="0.6"/>
  <circle cx="28"  cy="10" r="1"   fill="#e6edf3" opacity="0.5"/>
  <circle cx="218" cy="18" r="1.5" fill="#e6edf3" opacity="0.6"/>
  <circle cx="228" cy="8"  r="1"   fill="#e6edf3" opacity="0.5"/>
  <circle cx="120" cy="12" r="1"   fill="#e6edf3" opacity="0.4"/>

  <!-- moon -->
  <path d="M222 38 Q212 50 222 62 Q204 55 204 50 Q204 44 222 38Z" fill="#e6edf3" opacity="0.7"/>
</svg>
